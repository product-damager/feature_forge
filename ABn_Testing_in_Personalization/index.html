<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kameleoon | A/B/n Testing in Personalization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfd;
        }

        .vireo-gradient {
            background: #fcfcfd;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            background: #4f46e5;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #4f46e5;
            box-shadow: 0 0 0 4px white;
        }

        /* App Layout Styles */
        .sidebar-item-active {
            background-color: #f0f1ff;
            color: #4f46e5;
            border-right: 2px solid #4f46e5;
        }

        .section-divider {
            border-bottom: 1px solid #f3f4f6;
        }

        .app-shadow {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                'zap': 'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
                'layout-grid': 'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z',
                'target': 'M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z',
                'bar-chart-3': 'M3 3v18h18 M18 17V9 M13 17V5 M8 17v-3',
                'plus': 'M12 5v14M5 12h14',
                'more-vertical': 'M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0 M12 5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0 M12 19m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0',
                'chevron-down': 'M6 9l6 6 6-6',
                'chevron-right': 'M9 18l6-6-6-6',
                'eye': 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 17a5 5 0 100-10 5 5 0 000 10z',
                'trash-2': 'M3 6h18 M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2',
                'check-circle-2': 'M22 11.08V12a10 10 0 11-5.93-9.14 M22 4L12 14.01l-3-3',
                'sparkles': 'M9.603 4.833L10.864 1.23a.25.25 0 01.472 0l1.261 3.603a1.5 1.5 0 00.931.931l3.603 1.261a.25.25 0 010 .472l-3.603 1.261a1.5 1.5 0 00-.931.931l-1.261 3.603a.25.25 0 01-.472 0l-1.261-3.603a1.5 1.5 0 00-.931-.931l-3.603-1.261a.25.25 0 010-.472l3.603-1.261a1.5 1.5 0 00.931-.931z',
                'grip-vertical': 'M9 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm0 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm0 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm7-14a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm0 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm0 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0z',
                'help-circle': 'M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3 M12 17h.01',
                'arrow-left': 'M19 12H5M12 19l-7-7 7-7',
                'settings': 'M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z'
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ''} />
                </svg>
            );
        };

        const CONTENT_OPTIONS = ["AI Changes", "Graphic content", "Code content", "Winner content"];

        const RuleConfiguration = () => {
            const [isABTesting, setIsABTesting] = useState(false);
            const [ruleName, setRuleName] = useState("Everyone in the universe");
            const [exposedTraffic, setExposedTraffic] = useState(100);
            const [allocationMethod, setAllocationMethod] = useState('Manual');
            const [variations, setVariations] = useState([
                { id: 1, type: "AI Changes", allocation: 50 },
                { id: 2, type: "Graphic content", allocation: 50 }
            ]);

            const addVariation = () => {
                if (variations.length >= 4) return;
                setVariations([...variations, { id: Date.now(), type: CONTENT_OPTIONS[variations.length % 4], allocation: 0 }]);
            };

            return (
                <div className="bg-white min-h-full py-8 px-10 max-w-2xl mx-auto border-l border-slate-100 shadow-sm">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div className="flex items-center gap-2">
                            <h1 className="text-[22px] font-bold text-[#1e293b]">Configure the targeting rule</h1>
                            <div className="flex items-center gap-1.5 px-2 py-0.5 bg-[#f1f5f9] rounded-full">
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-400"></div>
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Draft</span>
                            </div>
                        </div>
                    </div>

                    {/* Rule Name Section */}
                    <div className="mb-0 py-6 border-b border-slate-100">
                        <label className="block text-[13px] font-bold text-[#1e293b] mb-2.5">Rule name</label>
                        <input
                            type="text"
                            value={ruleName}
                            onChange={(e) => setRuleName(e.target.value)}
                            className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-md text-[14px] text-slate-700 outline-none focus:border-indigo-500 transition-colors"
                        />
                    </div>

                    {/* Segments Section */}
                    <div className="mb-0 py-6 border-b border-slate-100">
                        <div className="flex items-center justify-between cursor-pointer group">
                            <div className="flex items-center gap-2">
                                <span className="text-[13px] font-bold text-[#1e293b]">Segments</span>
                                <span className="text-[12px] text-indigo-600 font-medium">All visitors are targeted</span>
                            </div>
                            <Icon name="chevron-right" size={16} className="text-slate-400 group-hover:text-slate-600 transition-colors" />
                        </div>
                    </div>

                    {/* Exposure Section */}
                    <div className="mb-0 py-6 border-b border-slate-100">
                        <div className="flex items-center justify-between mb-6 cursor-pointer group">
                            <span className="text-[13px] font-bold text-[#1e293b]">Exposure</span>
                            <Icon name="chevron-right" size={16} className="text-slate-400 group-hover:text-slate-600 transition-colors" />
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex-1">
                                <input
                                    type="range"
                                    min="0" max="100"
                                    value={exposedTraffic}
                                    onChange={(e) => setExposedTraffic(parseInt(e.target.value))}
                                    className="w-full"
                                />
                            </div>
                            <div className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 rounded-md bg-white min-w-[70px]">
                                <span className="text-[13px] font-medium text-slate-700">{exposedTraffic}%</span>
                                <div className="flex flex-col gap-0.5 ml-auto">
                                    <Icon name="chevron-down" size={8} className="rotate-180" />
                                    <Icon name="chevron-down" size={8} />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Content Section */}
                    <div className="mb-0 py-6 border-b border-slate-100">
                        <div className="mb-4">
                            <label className="block text-[13px] font-bold text-[#1e293b] mb-1">Content to display</label>
                            <p className="text-[12px] text-slate-500">Select the content to display to your exposed visitors.</p>
                        </div>

                        {!isABTesting ? (
                            <div className="space-y-4">
                                <div className="relative">
                                    <select className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-md text-[14px] text-slate-700 outline-none appearance-none cursor-pointer pr-10">
                                        {CONTENT_OPTIONS.map(opt => <option key={opt}>{opt}</option>)}
                                    </select>
                                    <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                </div>
                                <button
                                    onClick={() => setIsABTesting(true)}
                                    className="flex items-center gap-1 text-indigo-600 font-bold text-[13px] hover:text-indigo-700 transition-colors"
                                >
                                    <Icon name="plus" size={16} className="stroke-[3]" />
                                    Select another content
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {/* Allocation Method selector - Added per request */}
                                <div className="mb-4">
                                    <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Allocation method</label>
                                    <div className="relative w-48">
                                        <select
                                            className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-md text-[13px] text-slate-700 outline-none appearance-none cursor-pointer pr-8 font-medium"
                                            value={allocationMethod}
                                            onChange={(e) => setAllocationMethod(e.target.value)}
                                        >
                                            <option>Manual</option>
                                            <option>Multi-armed Bandit</option>
                                        </select>
                                        <Icon name="chevron-down" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-[1fr_120px] gap-4 mb-2">
                                    <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Content</span>
                                    <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wider text-right pr-2">Allocation</span>
                                </div>

                                <div className="space-y-3">
                                    {variations.map((v, idx) => (
                                        <div key={v.id} className="grid grid-cols-[1fr_120px] gap-4 items-center">
                                            <div className="relative">
                                                <select
                                                    className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-md text-[14px] text-slate-700 outline-none appearance-none cursor-pointer pr-10"
                                                    defaultValue={v.type}
                                                >
                                                    {CONTENT_OPTIONS.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                            </div>
                                            <div className="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-md bg-white">
                                                <input
                                                    type="text"
                                                    value={`${v.allocation}%`}
                                                    className="w-full text-right text-[13px] font-medium text-slate-700 outline-none"
                                                    readOnly
                                                />
                                                <div className="flex flex-col gap-0.5">
                                                    <Icon name="chevron-down" size={8} className="rotate-180" />
                                                    <Icon name="chevron-down" size={8} />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={addVariation}
                                    className="flex items-center gap-1 text-indigo-600 font-bold text-[13px] hover:text-indigo-700 transition-colors"
                                >
                                    <Icon name="plus" size={16} className="stroke-[3]" />
                                    Create a new variation
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Other Sections */}
                    {["Triggers", "Scheduling", "Display settings", "Rollback conditions"].map((label) => (
                        <div key={label} className="py-6 border-b border-slate-100 last:border-0">
                            <div className="flex items-center justify-between cursor-pointer group">
                                <div className="flex items-center gap-2">
                                    <span className="text-[13px] font-bold text-[#1e293b]">{label}</span>
                                    {label === "Triggers" && <span className="text-[12px] text-[#eab308] font-medium italic">Not configured</span>}
                                    {(label === "Scheduling" || label === "Display settings" || label === "Rollback conditions") && <span className="text-[12px] text-slate-400 font-medium">(Optional)</span>}
                                    {label === "Rollback conditions" && <span className="text-[12px] text-indigo-600 font-medium ml-2">2 defined</span>}
                                </div>
                                <Icon name="chevron-right" size={16} className="text-slate-400 group-hover:text-slate-600 transition-colors" />
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('rules');
            return (
                <div className="flex h-screen overflow-hidden bg-white">
                    {/* Left Mini Sidebar */}
                    <aside className="w-[60px] bg-[#1a1c2d] flex flex-col items-center py-4 shrink-0">
                        <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center mb-10">
                            <Icon name="zap" className="text-white w-5 h-5 fill-current" />
                        </div>
                        <div className="flex flex-col gap-8 text-slate-400">
                            <Icon name="eye" size={20} className="cursor-pointer hover:text-white transition-colors" />
                            <Icon name="target" size={20} className="cursor-pointer text-indigo-400" />
                            <Icon name="bar-chart-3" size={20} className="cursor-pointer hover:text-white transition-colors" />
                            <Icon name="check-circle-2" size={20} className="cursor-pointer hover:text-white transition-colors" />
                            <Icon name="settings" size={20} className="cursor-pointer hover:text-white transition-colors" />
                        </div>
                    </aside>

                    {/* Middle List Sidebar */}
                    <aside className="w-[280px] border-r border-slate-100 flex flex-col shrink-0">
                        <header className="h-[70px] flex items-center px-6 border-b border-slate-50">
                            <h2 className="font-bold text-slate-800">Targeting rules</h2>
                        </header>
                        <div className="p-4 flex-1">
                            <button className="w-full flex items-center justify-center gap-2 py-2 bg-indigo-600 text-white rounded-md text-[13px] font-bold mb-6">
                                <Icon name="plus" size={16} /> ADD TARGETING RULE
                            </button>
                            <div className="p-4 border-2 border-indigo-600 rounded-md bg-white shadow-sm relative mb-4">
                                <div className="text-[13px] font-bold text-slate-800 mb-1">Targeting rule 1</div>
                                <div className="text-[11px] text-indigo-600 font-medium">100% of All visitors exposed to AI Changes</div>
                                <div className="absolute right-2 top-2 text-slate-300">
                                    <Icon name="more-vertical" size={16} />
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content (The Panel We Care About) */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-[70px] bg-white border-b border-slate-100 flex items-center justify-between px-8 shrink-0">
                            <div className="flex items-center gap-6">
                                <span className="font-bold text-[15px] text-slate-800">My new personalization</span>
                                <div className="flex items-center gap-4 text-slate-400 text-[12px]">
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                                        <span>0 out of 1 rules online</span>
                                    </div>
                                    <span>Saved 1 h ago</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button className="px-5 py-2 hover:bg-slate-50 border border-slate-200 rounded-md text-[13px] font-bold flex items-center gap-2 text-slate-600">
                                    <Icon name="eye" size={16} /> SIMULATE
                                </button>
                                <button className="px-6 py-2 bg-indigo-600 text-white rounded-md text-[13px] font-bold">
                                    LAUNCH
                                </button>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto bg-[#fcfcfd]">
                            <RuleConfiguration />
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
