<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kameleoon | Personalization 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .vireo-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .active-tab {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="vireo-gradient text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const {
            LayoutGrid,
            Target,
            BarChart3,
            Settings,
            ArrowLeft,
            Plus,
            MoreVertical,
            ChevronDown,
            HelpCircle,
            Zap,
            User,
            Eye,
            Trash2,
            Edit3,
            CheckCircle2,
            Layers
        } = lucide;

        // Mock Data
        const INITIAL_CONTENT = [
            { id: 1, name: 'AI Optimization v2', type: 'Prompt-based', preview: 'Optimizing for high-intent...', status: 'Active' },
            { id: 2, name: 'Summer Banner High', type: 'Graphic', preview: 'Visual assets for VIPs', status: 'Draft' },
            { id: 3, name: 'Code Override 404', type: 'Code', preview: 'document.querySelector...', status: 'Active' }
        ];

        const INITIAL_SEGMENTS = [
            { id: 's1', name: 'VIP Visitors', description: 'Returning users with > $500 spend' },
            { id: 's2', name: 'Mobile Users', description: 'Device type is Smartphone' },
            { id: 's3', name: 'Waitlist Leads', description: 'Users signed up for Q4 beta' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('rules');
            const [rules, setRules] = useState([
                {
                    id: 1,
                    name: 'VIP Loyalty Mapping',
                    mappings: [
                        { segmentId: 's1', contentId: 1, exposure: 100 },
                        { segmentId: 's3', contentId: 2, exposure: 50 }
                    ]
                }
            ]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex flex-col pt-6">
                        <div className="px-6 mb-8 flex items-center gap-2">
                            <div className="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                                <Zap className="text-white w-5 h-5 fill-current" />
                            </div>
                            <span className="font-bold text-xl tracking-tight italic text-slate-900 flex items-center gap-1">
                                Vireo <span className="text-[10px] font-medium bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded uppercase -mt-1">Beta</span>
                            </span>
                        </div>

                        <nav className="flex-1 px-4 space-y-1">
                            <NavItem icon={<LayoutGrid size={18} />} label="Content" active={activeTab === 'content'} onClick={() => setActiveTab('content')} />
                            <NavItem icon={<Target size={18} />} label="Targeting Rules" active={activeTab === 'rules'} onClick={() => setActiveTab('rules')} />
                            <NavItem icon={<BarChart3 size={18} />} label="Goals" active={activeTab === 'goals'} onClick={() => setActiveTab('goals')} />
                            <NavItem icon={<CheckCircle2 size={18} />} label="Integrations" active={activeTab === 'integrations'} onClick={() => setActiveTab('integrations')} />
                        </nav>

                        <div className="p-4 border-t border-slate-100 flex items-center gap-3">
                            <a href="../index.html" className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors text-sm font-medium">
                                <ArrowLeft size={14} /> Back to Gallery
                            </a>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto p-12 animate-fade-in">
                        <header className="flex justify-between items-start mb-12">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900 mb-2">
                                    {activeTab === 'content' && 'Content Library'}
                                    {activeTab === 'rules' && 'Targeting Matrix 2.0'}
                                    {activeTab === 'goals' && 'Success Attribution'}
                                    {activeTab === 'integrations' && 'Ecosystem'}
                                </h1>
                                <p className="text-slate-500">
                                    {activeTab === 'rules' ? 'Map multiple segments to content variations within a single unified workflow.' : 'Configure your personalization campaign assets and logic.'}
                                </p>
                            </div>
                            <div className="flex gap-3">
                                <button className="px-5 py-2.5 bg-white border border-slate-200 rounded-xl font-semibold shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                                    <Eye size={16} /> Simulate
                                </button>
                                <button className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-semibold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                                    Launch Phase
                                </button>
                            </div>
                        </header>

                        {activeTab === 'rules' && <RulesWorkspace rules={rules} initialContent={INITIAL_CONTENT} initialSegments={INITIAL_SEGMENTS} />}
                        {activeTab === 'content' && <ContentLibrary content={INITIAL_CONTENT} />}
                        {activeTab !== 'rules' && activeTab !== 'content' && (
                            <div className="flex flex-col items-center justify-center h-64 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400">
                                <Layers size={32} className="mb-4 opacity-20" />
                                <p>Prototype focus is on <span className="font-semibold">Targeting Rules Matrix</span></p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all ${active
                            ? 'bg-indigo-50 text-indigo-700'
                            : 'text-slate-500 hover:bg-slate-50'
                        }`}
                >
                    {icon}
                    {label}
                </button>
            );
        }

        function RulesWorkspace({ rules, initialContent, initialSegments }) {
            return (
                <div className="space-y-6">
                    {rules.map(rule => (
                        <div key={rule.id} className="glass-panel rounded-3xl p-8 shadow-sm">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-indigo-100 text-indigo-700 rounded-lg">
                                        <Layers size={20} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800">{rule.name}</h3>
                                    <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Draft</span>
                                </div>
                                <div className="flex gap-2">
                                    <button className="p-2 hover:bg-slate-100 rounded-lg text-slate-400"><Edit3 size={18} /></button>
                                    <button className="p-2 hover:bg-red-50 hover:text-red-500 rounded-lg text-slate-400"><Trash2 size={18} /></button>
                                </div>
                            </div>

                            {/* The Matrix */}
                            <div className="space-y-4">
                                <div className="grid grid-cols-12 px-6 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                    <div className="col-span-5">Segment Segment</div>
                                    <div className="col-span-1 text-center font-serif text-lg lowercase italic leading-none opacity-40">is exposed to</div>
                                    <div className="col-span-4">Experience Content</div>
                                    <div className="col-span-2 text-right">Exposure %</div>
                                </div>

                                {rule.mappings.map((m, idx) => (
                                    <div key={idx} className="grid grid-cols-12 items-center bg-white border border-slate-100 rounded-2xl p-4 shadow-sm hover:border-indigo-200 transition-all group">
                                        {/* Segment Side */}
                                        <div className="col-span-5 flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
                                                <User size={18} />
                                            </div>
                                            <div>
                                                <div className="font-semibold text-slate-700">{initialSegments.find(s => s.id === m.segmentId)?.name || 'All Visitors'}</div>
                                                <div className="text-[10px] text-slate-400 truncate max-w-[200px]">{initialSegments.find(s => s.id === m.segmentId)?.description}</div>
                                            </div>
                                        </div>

                                        {/* Connector */}
                                        <div className="col-span-1 flex justify-center">
                                            <div className="w-8 h-px bg-slate-100 group-hover:bg-indigo-100 transition-all"></div>
                                        </div>

                                        {/* Content Side */}
                                        <div className="col-span-4 flex items-center gap-3">
                                            <div className="w-12 h-8 rounded bg-slate-100 overflow-hidden flex items-center justify-center">
                                                <Zap size={14} className="text-slate-300" />
                                            </div>
                                            <div>
                                                <div className="font-semibold text-slate-700">{initialContent.find(c => c.id === m.contentId)?.name}</div>
                                                <div className="text-[10px] px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded inline-block">
                                                    {initialContent.find(c => c.id === m.contentId)?.type}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Exposure */}
                                        <div className="col-span-2 flex items-center justify-end gap-3 px-4">
                                            <div className="text-sm font-bold text-slate-900">{m.exposure}%</div>
                                            <div className="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                <div className="h-full bg-indigo-500" style={{ width: `${m.exposure}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                <button className="w-full py-4 border-2 border-dashed border-slate-100 rounded-2xl text-slate-400 font-medium hover:border-indigo-200 hover:text-indigo-500 hover:bg-indigo-50/10 transition-all flex items-center justify-center gap-2">
                                    <Plus size={18} /> Add Segment-to-Content Mapping
                                </button>
                            </div>
                        </div>
                    ))}

                    <button className="flex items-center gap-2 text-indigo-600 font-bold px-6 py-4 rounded-3xl border-2 border-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-lg shadow-indigo-50">
                        <Plus size={20} /> Create New Targeting Rule
                    </button>
                </div>
            );
        }

        function ContentLibrary({ content }) {
            return (
                <div className="grid grid-cols-3 gap-6">
                    {content.map(c => (
                        <div key={c.id} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all">
                            <div className="aspect-video bg-slate-50 flex items-center justify-center border-b border-slate-100 relative group">
                                <div className="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-all"></div>
                                <Zap size={48} className="text-slate-200 group-hover:text-indigo-100 transition-all" />
                            </div>
                            <div className="p-6">
                                <div className="flex justify-between items-start mb-4">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-indigo-500">{c.type}</span>
                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${c.status === 'Active' ? 'bg-green-50 text-green-600' : 'bg-slate-50 text-slate-400'}`}>
                                        {c.status}
                                    </span>
                                </div>
                                <h4 className="font-bold text-slate-900 mb-1">{c.name}</h4>
                                <p className="text-xs text-slate-500 mb-6">{c.preview}</p>
                                <div className="flex gap-2">
                                    <button className="flex-1 py-2 bg-slate-900 text-white rounded-lg text-xs font-semibold hover:bg-slate-800 transition-all">Edit Content</button>
                                    <button className="p-2 border border-slate-200 rounded-lg text-slate-400"><MoreVertical size={14} /></button>
                                </div>
                            </div>
                        </div>
                    ))}
                    <button className="border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center p-8 text-slate-400 hover:border-indigo-300 hover:text-indigo-500 hover:bg-indigo-50/10 transition-all">
                        <div className="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-4 group-hover:bg-indigo-50">
                            <Plus size={24} />
                        </div>
                        <span className="font-semibold text-sm">Add New Content</span>
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>

</html>
